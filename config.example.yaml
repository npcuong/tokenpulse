# TokenPulse — Configuration
# Copy to ~/.config/tokenpulse/config.yaml and fill in your values.

refresh_interval: 300     # seconds between auto-refresh (default: 5 min)
warning_threshold: 80     # percent at which to send notification

providers:

  # ────────────────────────────────────────────────────────────────────────────
  # Claude (Anthropic)
  #
  # mode: proxy  ← RECOMMENDED — starts a local proxy on port 7778.
  #               Point your SDK here and tokens are counted automatically.
  #               export ANTHROPIC_BASE_URL=http://127.0.0.1:7778
  #               # or in Python:
  #               # client = anthropic.Anthropic(base_url="http://127.0.0.1:7778")
  #
  # mode: manual ← enter used_tokens yourself after checking:
  #               https://console.anthropic.com/settings/usage
  # ────────────────────────────────────────────────────────────────────────────
  claude:
    enabled: true
    mode: proxy            # "proxy" | "manual"
    api_key: ""            # sk-ant-... (forwarded by proxy to real API)
    proxy_port: 7778       # only used in proxy mode
    limit_tokens: 1000000  # your monthly token limit
    used_tokens: 0         # only used in manual mode

  # ────────────────────────────────────────────────────────────────────────────
  # ChatGPT (OpenAI)
  #
  # mode: api  ← RECOMMENDED — fetches real monthly usage from OpenAI billing.
  #             Only requires a standard API key (sk-...).
  #             Dashboard: https://platform.openai.com/account/usage
  #
  # mode: manual ← set used_usd yourself
  # ────────────────────────────────────────────────────────────────────────────
  openai:
    enabled: true
    mode: api              # "api" | "manual"
    api_key: ""            # sk-... (used directly, no proxy needed)
    limit_usd: 20.00       # your monthly spending limit (USD)
    used_usd: 0.00         # only used in manual mode

  # ────────────────────────────────────────────────────────────────────────────
  # Gemini (Google AI)
  #
  # mode: proxy  ← RECOMMENDED — starts a local proxy on port 7779.
  #               Point your SDK here and tokens are counted automatically.
  #               import google.generativeai as genai
  #               from google.api_core.client_options import ClientOptions
  #               genai.configure(
  #                   api_key="YOUR_KEY",
  #                   client_options=ClientOptions(api_endpoint="127.0.0.1:7779"),
  #                   transport="rest",
  #               )
  #
  # mode: manual ← enter used_tokens yourself from aistudio.google.com
  # ────────────────────────────────────────────────────────────────────────────
  gemini:
    enabled: true
    mode: proxy            # "proxy" | "manual"
    api_key: ""            # AIzaSy... (forwarded by proxy to real API)
    proxy_port: 7779       # only used in proxy mode
    limit_tokens: 1000000  # your monthly/daily token limit
    used_tokens: 0         # only used in manual mode
